[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "memcortex"
version = "0.1.0"
description = "Phase-1 local memory pipeline scaffold for MemCortex"
readme = "README.md"
requires-python = ">=3.10"
authors = [{name = "MemCortex"}]
dependencies = [
    "fastmcp>=3.0",
]

[project.scripts]
memcortex = "memcortex.cli:main"
opencortex-mcp = "opencortex.mcp_server:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
