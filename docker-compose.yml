services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: opencortex-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./.cortex/qdrant:/qdrant/storage
    restart: unless-stopped

  vllm-embedding:
    image: vllm/vllm-openai:latest
    container_name: opencortex-vllm-embedding
    profiles: ["gpu"]
    ports:
      - "8001:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    command:
      - --model
      - ${VLLM_EMBEDDING_MODEL:-BAAI/bge-m3}
      - --served-model-name
      - ${VLLM_EMBEDDING_MODEL_ALIAS:-bge-m3}
      - --task
      - embed
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --dtype
      - auto
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.85}
    volumes:
      - ./.cache/huggingface:/root/.cache/huggingface
    ipc: host
    gpus: all
    restart: unless-stopped

  opencortex:
    build: .
    container_name: opencortex-server
    ports:
      - "8921:8921"
    depends_on:
      - qdrant
    volumes:
      - ./.cortex:/data
      # - ./server.json:/app/server.json:ro
    environment:
      # ---- Server ----
      - OPENCORTEX_HTTP_SERVER_HOST=0.0.0.0
      - OPENCORTEX_HTTP_SERVER_PORT=8921
      # ---- Storage ----
      - OPENCORTEX_DATA_ROOT=/data
      - OPENCORTEX_QDRANT_URL=http://qdrant:6333
      # ---- Embedding (default: CPU local fastembed) ----
      - OPENCORTEX_EMBEDDING_PROVIDER=local
      - OPENCORTEX_EMBEDDING_MODEL=${OPENCORTEX_LOCAL_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      # ---- Embedding (optional GPU profile: vLLM OpenAI-compatible /v1/embeddings) ----
      # - OPENCORTEX_EMBEDDING_PROVIDER=openai
      # - OPENCORTEX_EMBEDDING_DIMENSION=${VLLM_EMBEDDING_DIMENSION:-1024}
      # - OPENCORTEX_EMBEDDING_MODEL=${VLLM_EMBEDDING_MODEL_ALIAS:-bge-m3}
      # - OPENCORTEX_EMBEDDING_API_KEY=${VLLM_API_KEY:-opencortex-local}
      # - OPENCORTEX_EMBEDDING_API_BASE=http://vllm-embedding:8000/v1
      # ---- LLM (required for insights generation) ----
      # - OPENCORTEX_LLM_MODEL=<your-model>
      # - OPENCORTEX_LLM_API_KEY=<your-key>
      # - OPENCORTEX_LLM_API_BASE=
      # ---- Rerank ----
      # - OPENCORTEX_RERANK_PROVIDER=
      # - OPENCORTEX_RERANK_MODEL=
      # - OPENCORTEX_RERANK_API_KEY=
      # - OPENCORTEX_RERANK_API_BASE=
      # - OPENCORTEX_RERANK_THRESHOLD=0.0
      # - OPENCORTEX_RERANK_FUSION_BETA=0.7
      # ---- Cortex Alpha (required for insights routes) ----
      # - OPENCORTEX_CORTEX_ALPHA={"trace_splitter_enabled":true,"archivist_enabled":true,"archivist_trigger_threshold":5}
    restart: unless-stopped

  opencortex-web:
    build: ./web
    container_name: opencortex-web
    ports:
      - "8080:80"
    depends_on:
      - opencortex
    restart: unless-stopped
