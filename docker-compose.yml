services:
  opencortex:
    build: .
    container_name: opencortex-server
    ports:
      - "8921:8921"
    volumes:
      - opencortex-data:/data
      # Mount config file (create server.json first, see README)
      # - ./server.json:/app/server.json:ro
    environment:
      - OPENCORTEX_DATA_ROOT=/data
      - OPENCORTEX_HTTP_SERVER_HOST=0.0.0.0
      - OPENCORTEX_HTTP_SERVER_PORT=8921
      - OPENCORTEX_TENANT_ID=default
      - OPENCORTEX_USER_ID=default
      # Embedding config (uncomment and fill in)
      # - OPENCORTEX_EMBEDDING_PROVIDER=volcengine
      # - OPENCORTEX_EMBEDDING_MODEL=doubao-embedding-vision-250615
      # - OPENCORTEX_EMBEDDING_API_KEY=your-api-key
      # - OPENCORTEX_EMBEDDING_API_BASE=https://ark.cn-beijing.volces.com/api/v3
    restart: unless-stopped

volumes:
  opencortex-data:
