services:
  opencortex:
    build: .
    container_name: opencortex-server
    ports:
      - "8921:8921"
    volumes:
      - ./.cortex:/data
      # Mount config file (optional, env vars override file values)
      # - ./server.json:/app/server.json:ro
    environment:
      # ---- Server ----
      - OPENCORTEX_HTTP_SERVER_HOST=0.0.0.0
      - OPENCORTEX_HTTP_SERVER_PORT=8921
      # ---- Storage ----
      - OPENCORTEX_DATA_ROOT=/data
      # - OPENCORTEX_EMBEDDING_DIMENSION=1024
      # ---- Embedding ----
      # - OPENCORTEX_EMBEDDING_PROVIDER=volcengine
      # - OPENCORTEX_EMBEDDING_MODEL=doubao-embedding-vision-250615
      # - OPENCORTEX_EMBEDDING_API_KEY=your-api-key
      # - OPENCORTEX_EMBEDDING_API_BASE=https://ark.cn-beijing.volces.com/api/v3
      # ---- LLM (for intent analysis) ----
      # - OPENCORTEX_LLM_MODEL=
      # - OPENCORTEX_LLM_API_KEY=
      # - OPENCORTEX_LLM_API_BASE=
      # ---- Rerank ----
      # - OPENCORTEX_RERANK_PROVIDER=
      # - OPENCORTEX_RERANK_MODEL=
      # - OPENCORTEX_RERANK_API_KEY=
      # - OPENCORTEX_RERANK_API_BASE=
      # - OPENCORTEX_RERANK_THRESHOLD=0.0
      # - OPENCORTEX_RERANK_FUSION_BETA=0.7
    restart: unless-stopped
